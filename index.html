<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register for Access</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;

      /* Background image */
      background-image: url("/assets/background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Card container */
    .container {
      max-width: 500px;
      width: 100%;
      padding: 30px;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .branding {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo {
      max-width: 180px;
      margin-bottom: 15px;
    }

    .banner {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }
