<!DOCTYPE html>
<html>
<head>
  <title>Register for Access to FIrstBag</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;

      /* Background image */
      background-image: url("assests/background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Main card */
    .container {
      max-width: 500px;
      width: 100%;
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .branding {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      max-width: 180px;
      margin-bottom: 15px;
    }

    .banner {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .welcome {
      text-align: center;
      margin-bottom: 25px;
    }

    .welcome h1 {
      margin: 15px 0 5px;
    }

    .welcome p {
      color: #555;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Branding -->
    <div class="branding">
      <img src="assests/logo.png" alt="logo" class="logo" />
    </div>

    <!-- Welcome Message -->
    <div class="welcome">
      <h1>Welcome to Unisys BRS Portal</h1>
      <p>Please complete the form below to request access.</p>
    </div>

    <!-- Registration Form -->
    <form id="registrationForm">
      <label>Email address</label>
      <input type="email" id="email" required />

      <label>First name</label>
      <input type="text" id="firstName" required />

      <label>Last name</label>
      <input type="text" id="lastName" required />

      <button type="submit">Register</button>
    </form>

    <div class="message" id="message"></div>
  </div>
